name: Contract CI

on:
  push:
    branches: [main]
    paths:
      - 'contract/**'
  pull_request:
    branches: [main]
    paths:
      - 'contract/**'

jobs:
  contract-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contract/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contract/Cargo.lock') }}

      - name: Build contract
        run: |
          cd contract
          cargo build --target wasm32-unknown-unknown --release

      - name: Run tests
        run: |
          cd contract
          cargo test